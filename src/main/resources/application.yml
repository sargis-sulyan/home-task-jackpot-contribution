spring:
  application:
    name: home-task-jackpot-contribution

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics


  datasource:
    url: jdbc:h2:mem:jackpotdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: jackpot-service
      auto-offset-reset: earliest
    producer:
      properties:
        spring.json.add.type.headers: false